<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="container">
    <!-- Pestañas de Navegación -->
    <nav>
        <button onclick="showSection('experiencia')">💼 Experiencia</button>
        <button onclick="showSection('proyectos')">🚀 Proyectos</button>
    </nav>

    <!-- Sección Proyectos con Miniaturas -->
    <section id="proyectos" class="section">
        <h2>Mis Proyectos</h2>
        <div class="project-grid">
            <div class="project-card">
                <img src="images.jpg" alt="Proyecto">
                <h3>Automatización de Login</h3>
                <p>Automatización con Selenium y Python. Incluye manejo de errores.</p>
                <i class="fab fa-github"></i>
            </div>
            <!-- Añade más tarjetas siguiendo esta estructura -->
        </div>
    </section>

    <!-- Sección Experiencia (Tal cual la entregaste) -->
    <section id="experiencia" class="section">
        <h2>Experiencia Profesional</h2>
        <div class="job-item">
            <h3>QA Automatizador Experto | Zenta Group</h3>
            <p>Lidero estrategias de ingeniería de calidad robustas en sectores críticos...</p>
            <!-- (Aquí pegas el resto de tu experiencia completa) -->
        </div>
    </section>
</div>

<script>
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }
</script>
</body>
</html>
